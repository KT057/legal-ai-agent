services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legal-ai-agent-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_ai_password}
      POSTGRES_DB: ${POSTGRES_DB:-legal_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_ai} -d ${POSTGRES_DB:-legal_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
